services:
  web:
    build: .
    container_name: farmflow_web
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=1
      - SECRET_KEY=your_local_secret
      # 🔌 Tell Django how to reach your separate Express container on your laptop:
      - EXPRESS_API_BASE_URL=http://host.docker.internal:3000 
      -
    # ⬇️ ADD THIS BLOCK RIGHT HERE ⬇️
    extra_hosts:  
      - "host.docker.internal:host-gateway"  
      
    volumes:
      # 👇 Mount to a dedicated data directory inside the container
      - sqlite_data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: farmflow_redis
    restart: always
    ports:
      - "6379:6379" # 💡 Note: Reset this to the standard Redis port 6379 unless 6380 is required

volumes:
  sqlite_data: